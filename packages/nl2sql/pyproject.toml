[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "gaokao-nl2sql"
version = "0.1.0"
description = "Natural language to read-only SQL for the Gaokao admission dataset."
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27,<1",
]

[project.optional-dependencies]
db = [
    "psycopg[binary]>=3.1,<4",
]
dev = [
    "pytest>=8,<9",
    "hypothesis>=6,<7",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["gaokao_nl2sql*"]
