services:
  gaokao-postgres:
    image: ${GAOKAO_POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    container_name: gaokao-postgres
    environment:
      POSTGRES_DB: ${GAOKAO_POSTGRES_DB:-gaokao}
      POSTGRES_USER: ${GAOKAO_POSTGRES_USER:-gaokao}
      POSTGRES_PASSWORD: ${GAOKAO_POSTGRES_PASSWORD:-gaokao_dev_password}
    ports:
      - "${GAOKAO_POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - gaokao-postgres-data:/var/lib/postgresql/data
      - ./packages/schema/001_core_tables.sql:/docker-entrypoint-initdb.d/001_core_tables.sql:ro
      - ./packages/schema/002_staging_tables.sql:/docker-entrypoint-initdb.d/002_staging_tables.sql:ro
      - ./packages/schema/004_seed_master_data.sh:/docker-entrypoint-initdb.d/003_seed_master_data.sh:ro
      - ./packages/schema/003_seed_staging_data.sh:/docker-entrypoint-initdb.d/004_seed_staging_data.sh:ro
      - ./packages/schema/005_rag_tables.sql:/docker-entrypoint-initdb.d/005_rag_tables.sql:ro
      - ./data/processed:/data/processed:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gaokao-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: gaokao-api
    environment:
      GAOKAO_DATABASE_URL: postgresql://${GAOKAO_POSTGRES_USER:-gaokao}:${GAOKAO_POSTGRES_PASSWORD:-gaokao_dev_password}@gaokao-postgres:5432/${GAOKAO_POSTGRES_DB:-gaokao}
      GAOKAO_LLM_BASE_URL: ${GAOKAO_LLM_BASE_URL:-https://api.deepseek.com}
      GAOKAO_LLM_API_KEY: ${GAOKAO_LLM_API_KEY:-}
      GAOKAO_LLM_MODEL: ${GAOKAO_LLM_MODEL:-deepseek-v4-flash}
      GAOKAO_LLM_TEMPERATURE: ${GAOKAO_LLM_TEMPERATURE:-0}
      GAOKAO_LLM_TIMEOUT: ${GAOKAO_LLM_TIMEOUT:-60}
      GAOKAO_LLM_INTENT_ENABLED: ${GAOKAO_LLM_INTENT_ENABLED:-true}
      GAOKAO_SQL_ANSWER_ENABLED: ${GAOKAO_SQL_ANSWER_ENABLED:-true}
      GAOKAO_SQL_ANSWER_MAX_ROWS: ${GAOKAO_SQL_ANSWER_MAX_ROWS:-20}
      GAOKAO_SQL_ANSWER_MAX_CHARS: ${GAOKAO_SQL_ANSWER_MAX_CHARS:-12000}
      GAOKAO_RAG_ANSWER_ENABLED: ${GAOKAO_RAG_ANSWER_ENABLED:-false}
      GAOKAO_RAG_ANSWER_MAX_CONTEXT_CHARS: ${GAOKAO_RAG_ANSWER_MAX_CONTEXT_CHARS:-12000}
      GAOKAO_RAG_ANSWER_MAX_HITS: ${GAOKAO_RAG_ANSWER_MAX_HITS:-3}
      GAOKAO_EMBEDDING_PROVIDER: ${GAOKAO_EMBEDDING_PROVIDER:-openai}
      GAOKAO_EMBEDDING_BASE_URL: ${GAOKAO_EMBEDDING_BASE_URL:-https://api-inference.modelscope.cn/v1}
      GAOKAO_EMBEDDING_API_KEY: ${GAOKAO_EMBEDDING_API_KEY:-}
      GAOKAO_EMBEDDING_MODEL: ${GAOKAO_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-4B}
      GAOKAO_EMBEDDING_DIMENSION: ${GAOKAO_EMBEDDING_DIMENSION:-2560}
      GAOKAO_EMBEDDING_ENCODING_FORMAT: ${GAOKAO_EMBEDDING_ENCODING_FORMAT:-float}
      GAOKAO_EMBEDDING_MAX_RETRIES: ${GAOKAO_EMBEDDING_MAX_RETRIES:-3}
      GAOKAO_EMBEDDING_DEVICE: ${GAOKAO_EMBEDDING_DEVICE:-auto}
      GAOKAO_EMBEDDING_TORCH_DTYPE: ${GAOKAO_EMBEDDING_TORCH_DTYPE:-auto}
      GAOKAO_EMBEDDING_CACHE_FOLDER: ${GAOKAO_EMBEDDING_CACHE_FOLDER:-models}
      GAOKAO_EMBEDDING_NORMALIZE: ${GAOKAO_EMBEDDING_NORMALIZE:-true}
      GAOKAO_EMBEDDING_QUERY_INSTRUCTION_ENABLED: ${GAOKAO_EMBEDDING_QUERY_INSTRUCTION_ENABLED:-true}
      GAOKAO_API_KEY: ${GAOKAO_API_KEY:-}
      GAOKAO_DEFAULT_LIMIT: ${GAOKAO_DEFAULT_LIMIT:-200}
      GAOKAO_MAX_LIMIT: ${GAOKAO_MAX_LIMIT:-1000}
      GAOKAO_POLICY_DEFAULT_TOP_K: ${GAOKAO_POLICY_DEFAULT_TOP_K:-5}
      GAOKAO_POLICY_MAX_TOP_K: ${GAOKAO_POLICY_MAX_TOP_K:-20}
      GAOKAO_STATEMENT_TIMEOUT_MS: ${GAOKAO_STATEMENT_TIMEOUT_MS:-10000}
    ports:
      - "${GAOKAO_API_HOST_PORT:-8000}:8000"
    depends_on:
      gaokao-postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gaokao-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: gaokao-web
    ports:
      - "${GAOKAO_WEB_HOST_PORT:-5173}:80"
    depends_on:
      gaokao-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  gaokao-postgres-data:
